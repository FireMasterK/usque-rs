# boring-sys needs a modern libclang for bindgen and perl for the BoringSSL
# build. Default cross images (0.2.5) are Ubuntu 16.04 and ship libclang 3.8.
[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "apt-get update",
    "apt-get install --assume-yes --no-install-recommends wget gnupg ca-certificates perl",
    "bash -c 'set -euo pipefail; if apt-get install --assume-yes --no-install-recommends clang-18 libclang-18-dev; then exit 0; fi; wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg; . /etc/os-release; echo \"deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] https://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-18 main\" > /etc/apt/sources.list.d/llvm.list; apt-get update; apt-get install --assume-yes --no-install-recommends clang-18 libclang-18-dev'",
    "update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100",
    "update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = [
    "LIBCLANG_PATH=/usr/lib/llvm-18/lib",
]
