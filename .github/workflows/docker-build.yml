name: Docker Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: 1337kavin/usque-rs

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux/amd64
            arch_tag: amd64
          - target: aarch64-unknown-linux-gnu
            platform: linux/arm64
            arch_tag: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake clang perl

      - name: Build
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --locked -p usque-cli

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: usque-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/usque
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Docker Build (${{ matrix.arch_tag }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux/amd64
            arch_tag: amd64
          - target: aarch64-unknown-linux-gnu
            platform: linux/arm64
            arch_tag: arm64

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: usque-${{ matrix.target }}
          path: dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch_tag }}
          build-args: |
            BINARY=dist/usque
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    name: Docker Manifest
    needs: docker
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create and push manifest list
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:latest-arm64 \
            ${{ env.IMAGE_NAME }}:latest-amd64
